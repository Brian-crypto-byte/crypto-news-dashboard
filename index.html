<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📰 Crypto News Dashboard</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0f0f13; color:#e0e0e0; font-family:'Segoe UI',system-ui,sans-serif; }

header {
  background:#16161e; border-bottom:1px solid #2a2a3a;
  padding:14px 24px; display:flex; align-items:center;
  justify-content:space-between; position:sticky; top:0; z-index:10;
}
header h1 { font-size:17px; font-weight:700; color:#fff; }
header h1 span { color:#7c6af7; }

.controls { display:flex; gap:8px; align-items:center; }
.btn {
  background:#7c6af7; border:none; color:#fff;
  padding:6px 14px; border-radius:6px; font-size:13px;
  font-weight:600; cursor:pointer; transition:background .15s;
}
.btn:hover { background:#6a58e0; }
.btn:disabled { background:#3a3a5a; cursor:default; }

.status-bar {
  background:#12121a; padding:7px 24px;
  font-size:12px; color:#555;
  display:flex; justify-content:space-between;
}
#countdown { color:#7c6af7; font-weight:600; }
#updatedAt { color:#444; }

.tabs {
  display:flex; gap:0; background:#12121a;
  border-bottom:1px solid #1a1a2a; padding:0 24px;
}
.tab {
  padding:10px 18px; font-size:13px; font-weight:500;
  color:#555; cursor:pointer; border-bottom:2px solid transparent;
  transition:all .15s;
}
.tab.active { color:#7c6af7; border-bottom-color:#7c6af7; }

.filter-bar {
  padding:10px 24px; display:flex; gap:8px;
  background:#12121a; border-bottom:1px solid #1a1a2a;
}
.fbtn {
  padding:4px 14px; border-radius:20px; font-size:12px;
  border:1px solid #2a2a3a; background:#1e1e2e; color:#777;
  cursor:pointer; transition:all .15s;
}
.fbtn.active         { background:#7c6af7; border-color:#7c6af7; color:#fff; }
.fbtn.long.active    { background:#163d1e; border-color:#22c55e; color:#22c55e; }
.fbtn.short.active   { background:#3d1212; border-color:#ef4444; color:#ef4444; }

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
  gap:12px; padding:18px 24px;
}

/* 新闻卡片 */
.card {
  background:#16161e; border:1px solid #222232;
  border-radius:10px; padding:14px;
  transition:transform .12s,border-color .12s;
  cursor:pointer; text-decoration:none; display:block; color:inherit;
}
.card:hover { transform:translateY(-2px); border-color:#3a3a5a; }
.card.long  { border-left:3px solid #22c55e; }
.card.short { border-left:3px solid #ef4444; }
.card.neutral { border-left:3px solid #333; }

.card-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px; }
.source { font-size:11px; color:#666; background:#1a1a2e; padding:2px 7px; border-radius:4px; }
.badges { display:flex; gap:5px; align-items:center; }
.sig { font-size:11px; font-weight:700; padding:2px 7px; border-radius:4px; text-transform:uppercase; }
.sig.long    { background:#163d1e; color:#22c55e; }
.sig.short   { background:#3d1212; color:#ef4444; }
.sig.neutral { background:#1e1e2e; color:#555; }
.grade {
  width:34px; height:34px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:12px; font-weight:700;
}
.grade.a { background:#163d1e; color:#22c55e; border:2px solid #22c55e; }
.grade.b { background:#1f3010; color:#84cc16; border:2px solid #84cc16; }
.grade.c { background:#1a1a2e; color:#555;    border:2px solid #2a2a3a; }

.title   { font-size:13px; line-height:1.55; color:#ddd; margin-bottom:8px; }
.summary { font-size:12px; color:#777; line-height:1.5; border-top:1px solid #1e1e2e; padding-top:7px; }
.card-foot { display:flex; justify-content:space-between; font-size:11px; color:#444; margin-top:8px; }

/* 推文卡片 */
.tweet-card {
  background:#16161e; border:1px solid #222232;
  border-radius:10px; padding:14px;
  transition:transform .12s,border-color .12s;
  text-decoration:none; display:block; color:inherit;
}
.tweet-card:hover { transform:translateY(-2px); border-color:#3a3a5a; }
.tweet-top { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.avatar {
  width:36px; height:36px; border-radius:50%;
  background:linear-gradient(135deg,#7c6af7,#4a9eff);
  display:flex; align-items:center; justify-content:center;
  font-size:14px; font-weight:700; color:#fff; flex-shrink:0;
}
.tweet-user { font-size:13px; font-weight:600; color:#ccc; }
.tweet-handle { font-size:11px; color:#555; }
.tweet-text { font-size:13px; line-height:1.6; color:#ddd; margin-bottom:10px; }
.tweet-stats { display:flex; gap:14px; font-size:12px; color:#555; }
.tweet-stats span { display:flex; align-items:center; gap:4px; }

.center { display:flex; flex-direction:column; align-items:center;
          justify-content:center; padding:80px; color:#444; font-size:14px; }
.spinner {
  width:32px; height:32px; border:3px solid #1e1e2e;
  border-top-color:#7c6af7; border-radius:50%;
  animation:spin .7s linear infinite; margin-bottom:14px;
}
@keyframes spin { to { transform:rotate(360deg); } }
.error-box {
  background:#2a1010; border:1px solid #5a1010;
  border-radius:8px; padding:16px 20px;
  margin:20px 24px; font-size:13px; color:#ef9090;
}
</style>
</head>
<body>

<header>
  <h1>📰 Crypto <span>Dashboard</span></h1>
  <div class="controls">
    <button class="btn" id="refreshBtn" onclick="loadData()">🔄 刷新</button>
  </div>
</header>

<div class="status-bar">
  <span id="statusText">就绪</span>
  <span>下次刷新 <span id="countdown">60:00</span> &nbsp;|&nbsp; <span id="updatedAt">-</span></span>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('news',this)">📰 新闻</div>
  <div class="tab" onclick="switchTab('tweets',this)">🐦 推文</div>
</div>

<div class="filter-bar" id="newsFilters">
  <button class="fbtn active" onclick="setFilter('all',this)">全部</button>
  <button class="fbtn long"   onclick="setFilter('long',this)">🟢 Long</button>
  <button class="fbtn short"  onclick="setFilter('short',this)">🔴 Short</button>
  <button class="fbtn"        onclick="setFilter('neutral',this)">⚪ Neutral</button>
</div>

<div id="grid" class="grid">
  <div class="center"><div class="spinner"></div>加载中...</div>
</div>

<script>
let data = {tweets:[], news:[]};
let tab = 'news', filter = 'all', timer, cd = 3600;

function switchTab(t, el) {
  tab = t;
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('newsFilters').style.display = t === 'news' ? 'flex' : 'none';
  render();
}

function setFilter(f, el) {
  filter = f;
  document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  render();
}

function gradeClass(g) {
  if (!g) return 'c';
  return g.startsWith('A') ? 'a' : g.startsWith('B') ? 'b' : 'c';
}

function render() {
  const grid = document.getElementById('grid');
  if (tab === 'news') renderNews(grid);
  else renderTweets(grid);
}

function renderNews(grid) {
  let items = filter === 'all' ? data.news : data.news.filter(n => n.signal === filter);
  if (!items.length) { grid.innerHTML = '<div class="center">📭 暂无新闻</div>'; return; }
  grid.innerHTML = items.map(n => `
    <a class="card ${n.signal||'neutral'}" href="${n.link||'#'}" target="_blank" rel="noopener">
      <div class="card-top">
        <span class="source">${n.source||''}</span>
        <div class="badges">
          <span class="sig ${n.signal||'neutral'}">${n.signal||'neutral'}</span>
          <div class="grade ${gradeClass(n.grade)}">${n.grade||'C'}</div>
        </div>
      </div>
      <div class="title">${n.text||''}</div>
      ${n.summary ? `<div class="summary">${n.summary}</div>` : ''}
      <div class="card-foot"><span>💯 ${n.score}分</span></div>
    </a>`).join('');
}

function renderTweets(grid) {
  const items = data.tweets;
  if (!items.length) { grid.innerHTML = '<div class="center">📭 暂无推文</div>'; return; }
  grid.innerHTML = items.map(t => `
    <a class="tweet-card" href="${t.url||'#'}" target="_blank" rel="noopener">
      <div class="tweet-top">
        <div class="avatar">${(t.user||'?')[0].toUpperCase()}</div>
        <div>
          <div class="tweet-user">${t.user||'?'}</div>
          <div class="tweet-handle">@${t.user||'?'}</div>
        </div>
      </div>
      <div class="tweet-text">${t.text||''}</div>
      <div class="tweet-stats">
        <span>❤️ ${(t.likes||0).toLocaleString()}</span>
        <span>🔁 ${(t.retweets||0).toLocaleString()}</span>
      </div>
    </a>`).join('');
}

function startTimer() {
  cd = 3600; clearInterval(timer);
  timer = setInterval(() => {
    cd--;
    const m = Math.floor(cd/60), s = cd%60;
    document.getElementById('countdown').textContent =
      `${m}:${s.toString().padStart(2,'0')}`;
    if (cd <= 0) loadData();
  }, 1000);
}

async function loadData() {
  document.getElementById('refreshBtn').disabled = true;
  document.getElementById('statusText').textContent = '加载中...';
  try {
    const resp = await fetch(`./data.json?t=${Date.now()}`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    data = await resp.json();
    document.getElementById('updatedAt').textContent = '更新于 ' + (data.updatedAt||'-');
    document.getElementById('statusText').textContent =
      `推文 ${data.tweets.length} 条 · 新闻 ${data.news.length} 条`;
    render();
    startTimer();
  } catch(e) {
    document.getElementById('grid').innerHTML =
      `<div class="error-box">⚠️ 加载失败: ${e.message}<br><small>data.json 尚未生成，等待首次推送（9:00-23:00 每小时更新）</small></div>`;
    document.getElementById('statusText').textContent = '加载失败';
  } finally {
    document.getElementById('refreshBtn').disabled = false;
  }
}

loadData();
</script>
</body>
</html>
